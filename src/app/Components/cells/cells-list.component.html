<div class="p-4 bg-slate-900 text-white min-h-screen">
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-xl font-bold tracking-wide text-slate-200">
      Ячейки распределения мощности РУ-10кВ (Всего: 30)
    </h2>
    <div class="flex gap-4 text-xs text-slate-400">
      <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-emerald-500"></span> Активна</span>
      <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-amber-500"></span> Перегрузка</span>
      <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-slate-500"></span> Ремонт (ТО)</span>
    </div>
  </div>

  <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 lg:grid-cols-6 gap-3">
    @for (cell of cells(); track cell.id) {
      <div 
        class="border transition-all duration-200 rounded-lg p-3 flex flex-col justify-between h-28 bg-slate-800/50"
        [ngClass]="{
          'border-emerald-500/30 bg-emerald-950/10': cell.status === 'active',
          'border-amber-500/50 bg-amber-950/20 animate-pulse': cell.status === 'overload',
          'border-slate-700 bg-slate-900/80 opacity-60': cell.status === 'maintenance',
          'border-blue-500/30': cell.status === 'idle'
        }">
        
        <div class="flex justify-between items-start">
          <span class="text-xs font-semibold text-slate-300 truncate pr-1" [title]="cell.name">
            №{{ cell.id.split('-')[1] }}
          </span>
          <span 
            class="w-2 h-2 rounded-full mt-1"
            [ngClass]="{
              'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]': cell.status === 'active',
              'bg-amber-500 shadow-[0_0_8px_rgba(245,158,11,0.5)]': cell.status === 'overload',
              'bg-slate-500': cell.status === 'maintenance',
              'bg-blue-400': cell.status === 'idle'
            }">
          </span>
        </div>

        <div class="my-1">
          <div class="text-lg font-mono font-bold text-slate-100">
            {{ cell.status === 'maintenance' ? '---' : cell.currentOutput + ' МВт' }}
          </div>
          <div class="text-[10px] text-slate-400">
            Номинал: {{ cell.nominalCapacity }} МВт
          </div>
        </div>

        <div class="flex justify-between items-center pt-1 border-t border-slate-700/50">
          <span class="text-[10px] text-slate-400 uppercase tracking-wider">Режим ТО</span>
          
          <label class="relative inline-flex items-center cursor-pointer select-none">
            <input 
              type="checkbox" 
              [checked]="cell.status === 'maintenance'"
              (change)="onToggleMaintenance(cell.id)"
              class="sr-only peer"
            >
            <div class="w-7 h-4 bg-slate-600 rounded-full peer peer-focus:ring-0 dark:bg-slate-700 peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:start-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all dark:border-slate-600 peer-checked:bg-amber-600"></div>
          </label>
        </div>

      </div>
    }
  </div>
</div>
